<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<style>
			body {
				font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
				background-color: #f4f7f9;
				display: flex;
				justify-content: center;
				align-items: center;
				height: 100vh;
				margin: 0;
			}

			/* Контейнер формы */
			form {
				background: #ffffff;
				padding: 30px;
				border-radius: 12px;
				box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
				width: 100%;
				max-width: 400px;
			}

			h2 {
				margin-top: 0;
				color: #333;
				text-align: center;
				font-size: 24px;
			}

			/* Стили для групп ввода */
			.form-group {
				margin-bottom: 20px;
			}

			label {
				display: block;
				margin-bottom: 8px;
				font-weight: 600;
				color: #555;
			}

			input {
				width: 100%;
				padding: 12px;
				border: 1px solid #ddd;
				border-radius: 6px;
				box-sizing: border-box; /* Чтобы padding не раздувал ширину */
				transition:
					border-color 0.3s,
					box-shadow 0.3s;
				font-size: 16px;
			}

			input:focus {
				outline: none;
				border-color: #007bff;
				box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.15);
			}

			/* Стиль кнопки */
			button {
				width: 100%;
				padding: 14px;
				background-color: #007bff;
				color: white;
				border: none;
				border-radius: 6px;
				font-size: 16px;
				font-weight: bold;
				cursor: pointer;
				transition:
					background-color 0.2s,
					transform 0.1s;
			}

			button:hover {
				background-color: #0056b3;
			}

			button:active {
				transform: scale(0.98);
			}
			.alert {
				background: #d4edda;
				color: #155724;
				padding: 10px;
				border-radius: 5px;
				margin-bottom: 15px;
				font-size: 14px;
				text-align: center;
				border: 1px solid #c3e6cb;
			}

			/* Контейнер для ссылки */
			.footer-links {
				margin-top: 20px;
				text-align: center;
				border-top: 1px solid #eee;
				padding-top: 15px;
			}

			.footer-links {
				margin-top: 20px;
				text-align: center;
				border-top: 1px solid #eee;
				padding-top: 15px;
			}

			/* Ссылка, оформленная как аккуратная кнопка или текст */
			.back-link {
				color: #666;
				text-decoration: none;
				font-size: 14px;
				transition: color 0.2s;
			}

			.back-link:hover {
				color: #007bff; /* Цвет при наведении */
				text-decoration: underline;
			}

			/* Анимация появления сообщения */
			@keyframes fadeIn {
				from {
					opacity: 0;
					transform: translateY(-10px);
				}
				to {
					opacity: 1;
					transform: translateY(0);
				}
			}
		</style>
	</head>
	<body>
		<form action="/add_student" method="POST">
			<label for="name">Имя:</label>
			<input
				name="name"
				type="text"
				id="name"
				required
				placeholder="Введите имя"
			/>

			<label for="age">Возраст:</label>
			<input
				name="age"
				type="number"
				id="age"
				required
				placeholder="Например 12"
			/>

			<label for="name">Оценка:</label>
			<input
				name="grade"
				type="number"
				id="grade"
				required
				placeholder="От 1 до 10"
				min="1"
				max="10"
			/>

			<button tupe="submit">Добавить</button>
		</form>
		{% if message %}
		<p class="alert">{{message}}</p>
		{% endif %}
		<div class="footer-links">
			<a href="/" + back class="back-link">Назад к списку</a>
		</div>
	</body>
</html>
